kind = "web"
previewPath = "/tawoss/"
title = "Tawoss – On-Demand Grooming"
version = "1.0.0"
id = "artifacts/tawoss"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tawoss/" ]
localPort = 24841

[services.development]
run = "pnpm --filter @workspace/tawoss run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tawoss", "run", "build" ]
publicDir = "artifacts/tawoss/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24841"
BASE_PATH = "/tawoss/"
